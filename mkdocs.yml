site_name: Engineer's Handbook
site_url: https://docs.devopslearning.ru
site_author: Andrey Deryugin
site_description: >-
  Моя библиотека знаний.


# Repository
repo_name: andrey97d/andrey97d.github.io
repo_url: https://github.com/andrey97d/andrey97d.github.io
edit_uri: edit/main/docs/
  
copyright: Copyright &copy; 2026 Andrey Deryugin

theme:
  name: material
  logo: assets/images/connection.png
  language: ru
  features:
    - content.action.edit
    - content.action.view
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.path
    - navigation.expand
    - navigation.instant
    - navigation.instant.prefetch
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.action.view
    - search.suggest
    - search.highlight
    - toc.integrate
    - announce.dismiss

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono




markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - attr_list
  - md_in_html

    
extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/andrey97d
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/u/andreyd997

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
  - git-authors

nav:
  - Главная: index.md
  - How-to:
    - тест: how-to/reference.md
    - Обзор: how-to/index.md
    - Настраиваем Nginx: how-to/nginx.md
    - Создаем свою страницу: how-to/create-website.md
  - DevOps Core:
    - Linux :
      - Обзор: devops-core/linux/index.md
    - Git:
      - Шпаргалка: devops-core/git/cheatsheet.md
      - Workflow: devops-core/git/workflow.md
      - Ветки: devops-core/git/branches.md
      - Изменения: devops-core/git/changes.md
      - Синхронизация: devops-core/git/sync.md
      - История и откаты: devops-core/git/history.md
      - Продвинутое: devops-core/git/advanced.md
      - Хаки: devops-core/git/life-hack.md
    - Docker:
      - Обзор: devops-core/docker/index.md
      - Dockerfile: devops-core/docker/dockerfile.md
      - Сети: devops-core/docker/network.md
      - Volume: devops-core/docker/volume.md
      - Compose: devops-core/docker/compose.md
  - Infrastructure:
    - Kubernetes:
      - Обзор: infra/kubernetes/index.md
    - CI/CD: 
      - Обзор: infra/cicd/index.md
    - Terraform:
      - Обзор: infra/terra/index.md
    - Nginx:
      - Обзор: infra/nginx/index.md
  - Programming:
    - Python:
      - Тест: programming/python/index.md
  - Data:
    - Базы данных:
      - Обзор: data/database/index.md
    - Excel:
      - Шпаргалка: data/excel/cheatsheet.md
  - Other:
    - Redfish / BMC:
      - Обзор: other/redfish/index.md


  
    
