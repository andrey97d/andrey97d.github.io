site_name: Engineer's Handbook
site_url: https://docs.devopslearning.ru


theme:
  name: material
  language: ru
  logo: assets/images/connection.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight


nav:
  - Главная: index.md
  - How-to:
    - Обзор: how-to/index.md
    - Настраиваем Nginx: how-to/nginx.md
    - Создаем свою страницу: how-to/create-website.md
  - Docker:
    - Обзор: docker/index.md
    - Dockerfile: docker/dockerfile.md
    - Сети: docker/network.md
    - Volume: docker/volume.md
    - Compose: docker/compose.md
  - Linux:
    - Обзор: linux/index.md
  - Git:
      - Шпаргалка: git/cheatsheet.md
      - Workflow: git/workflow.md
      - Ветки: git/branches.md
      - Изменения: git/changes.md
      - Синхронизация: git/sync.md
      - История и откаты: git/history.md
      - Продвинутое: git/advanced.md
      - Хаки: git/life-hack.md
  - Kubernetes:
    - Обзор: kubernetes/index.md
  - Redfish / BMC:
    - Обзор: redfish/index.md
  - Python:
    - Тест: python/index.md
  - Excel:
    - Шпаргалка: excel/cheatsheet.md
  
    